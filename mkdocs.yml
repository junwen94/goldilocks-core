site_name: goldilocks-core
site_description: AI-powered DFT tools
site_url: https://stfc.github.io/goldilocks-core
repo_url: https://github.com/stfc/goldilocks-core
repo_name: stfc/goldilocks-core

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - CLI: cli.md
  - Architecture: architecture.md
  - API Reference:
      - intent: api/intent.md
      - analyse: api/analyse.md
      - advise: api/advise.md
      - generate: api/generate.md
      - pseudo: api/pseudo.md
      - ml: api/ml.md
      - kmesh: api/kmesh.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
